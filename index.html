<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAYWAY PRO STORE</title>

<style>
:root {
  --dark:#0d0d0d;
  --dark2:#1a1a1a;
  --cream:#e6d3b3;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:var(--dark);color:white;}
html{scroll-behavior:smooth}

/* NAV */
header{position:fixed;width:100%;background:#000a;}
.navbar{display:flex;justify-content:space-between;padding:18px 40px;}
.logo{color:var(--cream);font-weight:bold;}

.nav-links{display:flex;gap:20px;}
.nav-links a{color:white;text-decoration:none;}

.hamburger{display:none;flex-direction:column;}
.hamburger span{width:25px;height:3px;background:white;margin:4px}

/* HERO SLIDER */
.hero {
  height:100vh;
  overflow:hidden;
  position:relative;
}

.slide {
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:1s;
}

.slide.active { opacity:1; }

.hero-text {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.hero-text h1{color:var(--cream);font-size:50px;}

/* SECTION */
section{padding:100px 40px;text-align:center}

/* FILTER */
.filter-btn{
  margin:5px;
  padding:8px 15px;
  background:var(--dark2);
  border:none;
  color:white;
  cursor:pointer;
}

.filter-btn.active{background:var(--cream);color:black}

/* CARD */
.gallery{display:flex;flex-direction:column;gap:20px;}

.card{
  display:flex;
  background:var(--dark2);
  border-radius:12px;
  overflow:hidden;
}

/* SLIDER PRODUK */
.product-slider{
  width:40%;
  position:relative;
}

.product-slider img{
  width:100%;
  height:250px;
  object-fit:cover;
  display:none;
}

.product-slider img.active{display:block;}

.slider-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#000a;
  border:none;
  color:white;
  cursor:pointer;
}

.prev{left:5px;}
.next{right:5px;}

.card-content{
  padding:20px;
  width:60%;
  text-align:left;
}

.price{color:var(--cream);font-weight:bold}

/* MOBILE */
@media(max-width:768px){
.nav-links{display:none;flex-direction:column;background:black;position:absolute;top:60px;width:100%;}
.nav-links.active{display:flex;}
.hamburger{display:flex;}

.card{flex-direction:column;}
.product-slider, .card-content{width:100%;}
}
</style>
</head>

<body>

<header>
<div class="navbar">
<div class="logo">HAYWAY</div>

<div class="nav-links" id="navLinks">
<a href="#home">Home</a>
<a href="#produk">Produk</a>
</div>

<div class="hamburger" id="hamburger">
<span></span><span></span><span></span>
</div>
</div>
</header>

<!-- HERO SLIDER -->
<section class="hero" id="home">
<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1491553895911-0055eca6402d')"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1520975916090-3105956dac38')"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1503342217505-b0a15ec3261c')"></div>

<div class="hero-text">
<h1>HAYWAY STORE</h1>
</div>
</section>

<!-- PRODUK -->
<section id="produk">
<h2 style="color:var(--cream)">Produk</h2>

<!-- FILTER -->
<div>
<button class="filter-btn active" onclick="filterProduct('all')">All</button>
<button class="filter-btn" onclick="filterProduct('hoodie')">Hoodie</button>
<button class="filter-btn" onclick="filterProduct('kaos')">Kaos</button>
</div>

<div class="gallery" id="gallery"></div>
</section>

<script>
// NAV
document.getElementById("hamburger").onclick=()=>{
document.getElementById("navLinks").classList.toggle("active");
};

// HERO SLIDER
let slides=document.querySelectorAll(".slide");
let index=0;

setInterval(()=>{
  slides[index].classList.remove("active");
  index=(index+1)%slides.length;
  slides[index].classList.add("active");
},3000);

// DATA PRODUK
const products=[
{
category:"hoodie",
desc:"Hoodie Oversize Black",
price:"250000",
images:[
"https://images.unsplash.com/photo-1520975916090-3105956dac38",
"https://images.unsplash.com/photo-1503342217505-b0a15ec3261c"
]
},
{
category:"kaos",
desc:"Kaos Streetwear",
price:"150000",
images:[
"https://images.unsplash.com/photo-1490481651871-ab68de25d43d",
"https://images.unsplash.com/photo-1483985988355-763728e1935b"
]
}
];

const gallery=document.getElementById("gallery");

// RENDER
function render(data){
gallery.innerHTML="";
data.forEach(p=>{
let imgIndex=0;

const card=document.createElement("div");
card.className="card";
card.setAttribute("data-category",p.category);

card.innerHTML=`
<div class="product-slider">
${p.images.map((img,i)=>`<img src="${img}" class="${i==0?'active':''}">`).join("")}
<button class="slider-btn prev">‹</button>
<button class="slider-btn next">›</button>
</div>

<div class="card-content">
<h3>${p.desc}</h3>
<p class="price">Rp ${p.price}</p>
</div>
`;

const imgs=card.querySelectorAll("img");

card.querySelector(".next").onclick=()=>{
imgs[imgIndex].classList.remove("active");
imgIndex=(imgIndex+1)%imgs.length;
imgs[imgIndex].classList.add("active");
};

card.querySelector(".prev").onclick=()=>{
imgs[imgIndex].classList.remove("active");
imgIndex=(imgIndex-1+imgs.length)%imgs.length;
imgs[imgIndex].classList.add("active");
};

gallery.appendChild(card);
});
}

render(products);

// FILTER
function filterProduct(cat){
document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

if(cat==="all") return render(products);

render(products.filter(p=>p.category===cat));
}
</script>

</body>
</html>
